<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Radiographia.org</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/sayword/">
  <link rel="icon" href="/icon.png">
  
  <style>
    /* Глобальные стили с использованием переменных */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* --- Header --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      gap: 15px;
    }
    
    .header-group {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    header img { height: 40px; width: auto; border-radius: 4px; }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--text-color);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* --- Theme Switcher --- */
    #theme-switcher {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    #theme-switcher:hover {
      background-color: var(--accent-color);
      color: #fff;
      border-color: var(--accent-color);
    }

    /* --- Navigation --- */
    nav {
      background-color: var(--nav-bg);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    nav ul { list-style: none; display: flex; justify-content: center; margin: 0; padding: 0; }
    nav li { border-right: 1px solid var(--border-color); }
    nav li:first-child { border-left: 1px solid var(--border-color); }

    nav a {
      display: block; text-decoration: none; font-weight: 500; font-size: 0.9rem;
      color: var(--text-color); padding: 15px 30px;
      transition: background-color 0.2s, color 0.2s; text-transform: uppercase;
    }
    nav a:hover { background-color: var(--bg-color); }
    nav a.active { background-color: var(--accent-color); color: #ffffff; }

    /* --- Content & Footer --- */
    #content {
      display: block; width: 100%; max-width: 900px; margin: 0 auto;
      padding: 30px 20px; box-sizing: border-box; flex: 1;
    }
    footer {
      padding: 20px; background-color: var(--header-bg); color: var(--text-color);
      text-align: center; font-size: 0.8rem; border-top: 1px solid var(--border-color);
      opacity: 0.7; margin-top: 40px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 10px; }
      nav ul { flex-direction: column; }
      nav li { border-right: none; border-bottom: 1px solid var(--border-color); }
      nav li:first-child { border-left: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-group">
      <img src="icon.png" alt="Logo">
      <h1>RADIOGRAPHIA</h1>
    </div>
    <button id="theme-switcher">Сменить тему</button>
  </header>

  <nav>
    <ul>
      <li><a href="/home">Главная</a></li>
      <li><a href="/dev">Направления</a></li>
      <li><a href="/about">О нас</a></li>
    </ul>
  </nav>

  <!-- Сюда router.js будет вставлять контент -->
  <div id="content"></div>

  <footer>© 2026 RADIOGRAPHIA.ORG</footer>

  <!-- Инициализация темы и Роутера -->
  <script type="module">
    import { initTheme, applyTheme } from './modules/theme-controller.js';
    import './router.js'; // Импортируем роутер, чтобы он запустился

    // Инициализация темы
    initTheme();

    // Кнопка переключения
    document.getElementById('theme-switcher').addEventListener('click', () => {
      const current = localStorage.getItem('app-theme');
      const next = current === 'dark' ? 'ivory' : 'dark';
      applyTheme(next);
    });
  </script>
</body>
</html>
